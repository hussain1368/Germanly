<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Germanly Sign-In Complete</title>
    <style>
        :root {
            color-scheme: light;
            font-family: "Segoe UI", Arial, sans-serif;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            background: linear-gradient(135deg, #171717 0%, #243047 55%, #1e4770 100%);
            color: #ffffff;
        }

        main {
            width: min(92vw, 520px);
            padding: 32px 28px;
            border-radius: 18px;
            background: rgba(255, 255, 255, 0.12);
            box-shadow: 0 18px 48px rgba(0, 0, 0, 0.22);
            backdrop-filter: blur(8px);
        }

        h1 {
            margin: 0 0 14px;
            font-size: 28px;
        }

        p {
            margin: 0;
            line-height: 1.6;
            color: #dce8f6;
        }
    </style>
</head>
<body>
    <main>
        <h1>Germanly sign-in complete</h1>
        <p>You can return to the app now.</p>
    </main>
</body>
</html>
